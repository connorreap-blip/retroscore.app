<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Split-flap tile icon -->
  <rect x="2" y="2" width="28" height="28" rx="3" fill="#1a1a1a"/>
  <!-- Top half -->
  <rect x="2" y="2" width="28" height="14" rx="3" fill="#222"/>
  <!-- Split line -->
  <line x1="2" y1="16" x2="30" y2="16" stroke="#000" stroke-width="1" opacity="0.4"/>
  <!-- Letter F -->
  <text x="16" y="22" text-anchor="middle" font-family="monospace" font-weight="600" font-size="18" fill="#f0ece4">F</text>
  <!-- Subtle highlight -->
  <rect x="2" y="2" width="28" height="1" rx="1" fill="white" opacity="0.08"/>
</svg>
