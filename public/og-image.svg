      <rect x="132" y="0" width="38" height="50" rx="2" fill="#1a1a1a"/>
      <text x="151" y="35" text-anchor="middle">R</text>
      <rect x="176" y="0" width="38" height="50" rx="2" fill="#1a1a1a"/>
      <text x="195" y="35" text-anchor="middle">O</text>
      <rect x="264" y="0" width="38" height="50" rx="2" fill="#1a1a1a"/>
