    <rect x="444" y="160" width="38" height="50" rx="2" fill="#1a1a1a"/>
    <rect x="488" y="160" width="38" height="50" rx="2" fill="#1a1a1a"/>
    <rect x="532" y="160" width="38" height="50" rx="2" fill="#1a1a1a"/>
    <rect x="576" y="160" width="38" height="50" rx="2" fill="#1a1a1a"/>
    <rect x="620" y="160" width="38" height="50" rx="2" fill="#1a1a1a"/>
