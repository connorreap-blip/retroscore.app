    <!-- Row 4: TURN ANY TV INTO A -->
    <g transform="translate(180, 330)">
      <rect x="0" y="0" width="38" height="50" rx="2" fill="#1a1a1a"/>
      <text x="19" y="35" text-anchor="middle">R</text>
      <rect x="44" y="0" width="38" height="50" rx="2" fill="#1a1a1a"/>
      <text x="63" y="35" text-anchor="middle">E</text>
      <rect x="88" y="0" width="38" height="50" rx="2" fill="#1a1a1a"/>
