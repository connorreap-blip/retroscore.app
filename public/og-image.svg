<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#000"/>

  <!-- Board frame -->
  <rect x="100" y="120" width="1000" height="390" rx="6" fill="#0a0a0a" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Accent line -->
  <line x1="120" y1="120" x2="1080" y2="120" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- Tile grid approximation - row 1: FLAPPYBOARDS -->
  <g font-family="monospace" font-weight="500" font-size="28" fill="#f0ece4">
    <!-- Row 2 -->
    <g transform="translate(180, 220)">
      <rect x="0" y="0" width="38" height="50" rx="2" fill="#1a1a1a"/>
      <text x="19" y="35" text-anchor="middle">F</text>
      <rect x="44" y="0" width="38" height="50" rx="2" fill="#1a1a1a"/>
      <text x="63" y="35" text-anchor="middle">L</text>
      <rect x="88" y="0" width="38" height="50" rx="2" fill="#1a1a1a"/>
      <text x="107" y="35" text-anchor="middle">A</text>
      <rect x="132" y="0" width="38" height="50" rx="2" fill="#1a1a1a"/>
      <text x="151" y="35" text-anchor="middle">P</text>
      <rect x="176" y="0" width="38" height="50" rx="2" fill="#1a1a1a"/>
      <text x="195" y="35" text-anchor="middle">P</text>
      <rect x="220" y="0" width="38" height="50" rx="2" fill="#1a1a1a"/>
      <text x="239" y="35" text-anchor="middle">Y</text>
      <rect x="264" y="0" width="38" height="50" rx="2" fill="#1a1a1a"/>
      <text x="283" y="35" text-anchor="middle">B</text>
      <rect x="308" y="0" width="38" height="50" rx="2" fill="#1a1a1a"/>
      <text x="327" y="35" text-anchor="middle">O</text>
      <rect x="352" y="0" width="38" height="50" rx="2" fill="#1a1a1a"/>
      <text x="371" y="35" text-anchor="middle">A</text>
      <rect x="396" y="0" width="38" height="50" rx="2" fill="#1a1a1a"/>
      <text x="415" y="35" text-anchor="middle">R</text>
      <rect x="440" y="0" width="38" height="50" rx="2" fill="#1a1a1a"/>
      <text x="459" y="35" text-anchor="middle">D</text>
      <rect x="484" y="0" width="38" height="50" rx="2" fill="#1a1a1a"/>
      <text x="503" y="35" text-anchor="middle">S</text>
